name: Update Streak Stats

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate streak stats
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: streak-korean.svg
          theme: dark
          hide-border: true

          # Korean-aesthetic / soft Seoul night palette
          background: 0B1020
          stroke: 23283B
          ring: C4B5FD
          fire: F9A8D4
          currStreakNum: FFD29D
          currStreakLabel: E9D5FF
          sideNums: F8FAFC
          sideLabels: A1A1AA
          dates: 94A3B8

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add streak-korean.svg
          git commit -m "Update streak stats" || exit 0
          git push
