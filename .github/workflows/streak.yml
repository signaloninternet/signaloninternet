name: Update Streak Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: streak-dark.svg
          theme: dark
          hide-border: true
          background: 0F0F1A
          stroke: 1F1F2E
          ring: 8B5CF6
          fire: F97316
          currStreakNum: F97316
          currStreakLabel: 8B5CF6
          sideNums: E2E8F0
          sideLabels: 6B7280
          dates: 6B7280

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add streak-dark.svg
          git commit -m "Update streak stats" || exit 0
          git push
